	 <script type="text/javascript">
function id( el ){
        return document.getElementById( el );
}
function mostra( el ){
        id( el ).style.display = 'block';
}
function esconde_todos( el, tagName ){
        var tags = el.getElementsByTagName( tagName );
        for( var i=0; i<tags.length; i++ )
        {
                tags[i].style.display = 'none';
        }
}
window.onload = function()
{
        id('5').style.display = 'none';
		
		   id('4').style.display = 'none';
        id('rd-time').onchange = function()
        {
                esconde_todos( id('palco'), 'div' );
                mostra( this.value );
				 esconde_todos( id('palco2'), 'div' );
                mostra( this.value );
        }
        var radios = document.getElementsByTagName('input');
        for( var i=0; i<radios.length; i++ ){
                if( radios[i].type=='radio' )
                {
                        radios[i].onclick = function(){
                                
							esconde_todos( id('palco'), 'div' );
                                mostra( this.value );
								 esconde_todos( id('palco2'), 'div' );
                                mostra( this.value );
                        }
                }
        }
}
</script>
